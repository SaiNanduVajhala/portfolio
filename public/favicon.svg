<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
  <defs>
    <!-- Glowing green gradient -->
    <linearGradient id="greenGlow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#10B981" />
      <stop offset="100%" stop-color="#059669" />
    </linearGradient>
    <!-- Glowing blue gradient -->
    <linearGradient id="blueGlow" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#3B82F6" />
      <stop offset="100%" stop-color="#2563EB" />
    </linearGradient>
    <!-- Glow filter for premium neon effect -->
    <filter id="neonGlow" x="-20%" y="-20%" width="140%" height="140%" filterUnits="userSpaceOnUse">
      <feGaussianBlur stdDeviation="16" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <!-- Glowing outer hexagon -->
  <polygon points="256,40 440,146 440,366 256,472 72,366 72,146" stroke="url(#greenGlow)" stroke-width="24" stroke-linejoin="round" filter="url(#neonGlow)" />

  <!-- Inner neural network/connections -->
  <line x1="256" y1="120" x2="170" y2="220" stroke="url(#blueGlow)" stroke-width="12" stroke-linecap="round" filter="url(#neonGlow)" />
  <line x1="256" y1="120" x2="342" y2="220" stroke="url(#blueGlow)" stroke-width="12" stroke-linecap="round" filter="url(#neonGlow)" />
  <line x1="170" y1="220" x2="170" y2="340" stroke="url(#blueGlow)" stroke-width="12" stroke-linecap="round" filter="url(#neonGlow)" />
  <line x1="342" y1="220" x2="342" y2="340" stroke="url(#blueGlow)" stroke-width="12" stroke-linecap="round" filter="url(#neonGlow)" />
  <line x1="170" y1="340" x2="256" y2="400" stroke="url(#blueGlow)" stroke-width="12" stroke-linecap="round" filter="url(#neonGlow)" />
  <line x1="342" y1="340" x2="256" y2="400" stroke="url(#blueGlow)" stroke-width="12" stroke-linecap="round" filter="url(#neonGlow)" />

  <!-- Diagonal cross connections -->
  <line x1="256" y1="120" x2="256" y2="400" stroke="url(#blueGlow)" stroke-width="6" stroke-dasharray="8 8" opacity="0.6" />
  <line x1="170" y1="220" x2="342" y2="340" stroke="url(#blueGlow)" stroke-width="6" stroke-dasharray="8 8" opacity="0.6" />
  <line x1="342" y1="220" x2="170" y2="340" stroke="url(#blueGlow)" stroke-width="6" stroke-dasharray="8 8" opacity="0.6" />

  <!-- Glowing nodes/joints -->
  <circle cx="256" cy="120" r="20" fill="#10B981" filter="url(#neonGlow)" />
  <circle cx="170" cy="220" r="20" fill="#3B82F6" filter="url(#neonGlow)" />
  <circle cx="342" cy="220" r="20" fill="#3B82F6" filter="url(#neonGlow)" />
  <circle cx="170" cy="340" r="20" fill="#3B82F6" filter="url(#neonGlow)" />
  <circle cx="342" cy="340" r="20" fill="#3B82F6" filter="url(#neonGlow)" />
  <circle cx="256" cy="400" r="20" fill="#10B981" filter="url(#neonGlow)" />

  <!-- Core AI processing unit -->
  <rect x="216" y="216" width="80" height="80" rx="16" fill="url(#greenGlow)" filter="url(#neonGlow)" />
  <circle cx="256" cy="256" r="16" fill="#FFFFFF" />
</svg>